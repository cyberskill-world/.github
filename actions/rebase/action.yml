---
name: 🔀 Rebase
description: This action rebase the specific branch into the target branch
inputs:
  GH_TOKEN:
    description: GitHub token for authentication
    required: true
  FROM:
    description: The branch to rebase from
    required: true
  TO:
    description: The branch to rebase into
    required: true
runs:
  using: "composite"
  steps:
    - name: Set up Git & Auth
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.GH_TOKEN }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git remote set-url origin https://x-access-token:$GH_TOKEN@github.com/${{ github.repository }}

    - name: Rebase and Push
      shell: bash
      env:
        FROM: ${{ inputs.FROM }}
        TO: ${{ inputs.TO }}
      run: |
        validate_branch() {
          local name="$1"
          local value="$2"

          if [[ "$value" == -* ]]; then
            echo "❌ Invalid branch name for $name: must not start with '-'" >&2
            exit 1
          fi
          if [[ "$value" == *:* ]]; then
            echo "❌ Invalid branch name for $name: must not contain ':'" >&2
            exit 1
          fi
          if [[ "$value" == refs/* ]]; then
            echo "❌ Invalid branch name for $name: must not start with 'refs/'" >&2
            exit 1
          fi
          if ! git check-ref-format --branch "$value" > /dev/null 2>&1; then
            echo "❌ Invalid branch name for $name: '$value' is not a valid Git branch" >&2
            exit 1
          fi
        }

        validate_branch "FROM" "$FROM"
        validate_branch "TO" "$TO"

        # ⚡ Bolt: Fetch both branches in a single command to save a network round-trip
        git fetch origin "$FROM" "$TO" || {
          echo "❌ Branch $FROM or $TO not found"; exit 1;
        }

        git checkout "$TO"
        git reset --hard "origin/$TO"

        git rebase "origin/$FROM"

        git push origin "$TO" --force-with-lease
