---
name: 🚀 Deploy
description: This action deploys the project to a server using SSH and restarts the PM2 app.
inputs:
  HOST:
    description: The host of the server to deploy to
    required: true
  PORT:
    description: The port to connect to the server
    required: true
    default: "22"
  USERNAME:
    description: The username to connect to the server
    required: true
  PASSWORD:
    description: The password to connect to the server
    required: false
  KEY:
    description: The private key to connect to the server
    required: true
  PASSPHRASE:
    description: The passphrase for the private key
    required: false
  PATH:
    description: The path to the project on the server
    required: true
  BRANCH:
    description: The branch to deploy from
    required: true
  APP_NAME:
    description: PM2 app name for targeted health check (if empty, checks any online process)
    required: false
  HEALTH_CHECK_RETRIES:
    description: Number of health check retry attempts
    required: false
    default: "5"
  HEALTH_CHECK_INTERVAL:
    description: Seconds to wait between health check retries
    required: false
    default: "3"
runs:
  using: "composite"
  steps:
    - name: Deploy to server
      uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2  # v1.2.5
      env:
        DEPLOY_PATH: ${{ inputs.PATH }}
        DEPLOY_BRANCH: ${{ inputs.BRANCH }}
        DEPLOY_APP_NAME: ${{ inputs.APP_NAME }}
        HEALTH_RETRIES: ${{ inputs.HEALTH_CHECK_RETRIES }}
        HEALTH_INTERVAL: ${{ inputs.HEALTH_CHECK_INTERVAL }}
      with:
        host: ${{ inputs.HOST }}
        port: ${{ inputs.PORT }}
        username: ${{ inputs.USERNAME }}
        password: ${{ inputs.PASSWORD }}
        key: ${{ inputs.KEY }}
        passphrase: ${{ inputs.PASSPHRASE }}
        envs: DEPLOY_PATH,DEPLOY_BRANCH,DEPLOY_APP_NAME,HEALTH_RETRIES,HEALTH_INTERVAL
        script: |
          set -euo pipefail
          if [ -f ~/.profile ]; then source ~/.profile; fi
          if [ -f ~/.nvm/nvm.sh ]; then source ~/.nvm/nvm.sh; fi || true

          # --- Validation ---
          # ⚠️ SYNC: This function is duplicated from scripts/validate-branch.sh
          # because this script runs via SSH on the remote server where the file isn't available.
          # Keep both copies in sync!
          validate_branch() {
            local name="$1"
            local value="$2"

            if [[ -z "$value" ]]; then
              echo "❌ Invalid branch name for $name: must not be empty" >&2
              exit 1
            fi

            if [[ "$value" == -* ]]; then
              echo "❌ Invalid branch name for $name: must not start with '-'" >&2
              exit 1
            fi

            if [[ "$value" == *:* ]]; then
              echo "❌ Invalid branch name for $name: must not contain ':' (refspecs are not allowed)" >&2
              exit 1
            fi

            if [[ "$value" == refs/* ]]; then
              echo "❌ Invalid branch name for $name: must not start with 'refs/'" >&2
              exit 1
            fi

            if ! git check-ref-format --branch "$value" > /dev/null 2>&1; then
              echo "❌ Invalid branch name for $name: '$value' is not a valid Git branch" >&2
              exit 1
            fi
          }

          if ! command -v git >/dev/null 2>&1; then
            echo "❌ Error: git is not installed or not available in PATH." >&2
            exit 1
          fi

          validate_branch "DEPLOY_BRANCH" "$DEPLOY_BRANCH"

          if [[ -z "$DEPLOY_PATH" ]]; then
            echo "❌ DEPLOY_PATH must not be empty" >&2; exit 1
          fi
          if [[ "$DEPLOY_PATH" != /* ]]; then
            echo "❌ DEPLOY_PATH must be an absolute path" >&2; exit 1
          fi
          if [[ "$DEPLOY_PATH" == *..* ]]; then
            echo "❌ DEPLOY_PATH must not contain '..' (path traversal)" >&2; exit 1
          fi
          if [[ ! -d "$DEPLOY_PATH" ]]; then
            echo "❌ DEPLOY_PATH '$DEPLOY_PATH' does not exist or is not a directory" >&2; exit 1
          fi

          echo "🚀 Deploying to $DEPLOY_PATH..."
          cd "$DEPLOY_PATH"

          # Capture current commit for rollback
          PREV_COMMIT=$(git rev-parse HEAD)

          echo "⬇️ Fetching latest changes..."
          git fetch origin +refs/heads/"$DEPLOY_BRANCH":refs/remotes/origin/"$DEPLOY_BRANCH"
          git checkout "$DEPLOY_BRANCH"
          git pull origin "$DEPLOY_BRANCH"

          echo "📦 Installing dependencies..."
          pnpm install --frozen-lockfile

          echo "🏗️ Building project..."
          pnpm build

          echo "🔄 Reloading application..."
          pm2 startOrReload ecosystem.config.cjs --update-env
          pm2 save

          # Health check with retry loop and rollback on failure
          APP_NAME_FILTER="${DEPLOY_APP_NAME:-}"
          HEALTH_OK=0
          for attempt in $(seq 1 "$HEALTH_RETRIES"); do
            sleep "$HEALTH_INTERVAL"
            if [ -n "$APP_NAME_FILTER" ]; then
              HEALTH_OK=$(pm2 jlist | jq -r --arg name "$APP_NAME_FILTER" '.[] | select(.name == $name) | .pm2_env.status' | grep -c "online" || true)
            else
              HEALTH_OK=$(pm2 ls | grep -c "online" || true)
            fi
            if [ "$HEALTH_OK" -gt 0 ]; then
              break
            fi
            echo "⏳ Health check attempt $attempt/$HEALTH_RETRIES..."
          done

          if [ "$HEALTH_OK" -eq 0 ]; then
            echo "❌ Health check failed! Rolling back to $PREV_COMMIT..."
            git reset --hard "$PREV_COMMIT"
            pnpm install --frozen-lockfile
            pnpm build
            pm2 startOrReload ecosystem.config.cjs --update-env
            pm2 save
            echo "⚠️ Rolled back to $PREV_COMMIT"
            exit 1
          fi

          echo "✅ Deployment successful!"
