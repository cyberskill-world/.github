---
name: 🚀 Deploy
description: This action deploys the project to a server using SSH and restarts the PM2 app.
inputs:
  HOST:
    description: The host of the server to deploy to
    required: true
  PORT:
    description: The port to connect to the server
    required: true
    default: 22
  USERNAME:
    description: The username to connect to the server
    required: true
  PASSWORD:
    description: The password to connect to the server
    required: false
  KEY:
    description: The private key to connect to the server
    required: true
  PASSPHRASE:
    description: The passphrase for the private key
    required: false
  PATH:
    description: The path to the project on the server
    required: true
  BRANCH:
    description: The branch to deploy from
    required: true
runs:
  using: "composite"
  steps:
    - name: Deploy to server
      uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2  # v1.2.5
      env:
        DEPLOY_PATH: ${{ inputs.PATH }}
        DEPLOY_BRANCH: ${{ inputs.BRANCH }}
      with:
        host: ${{ inputs.HOST }}
        port: ${{ inputs.PORT }}
        username: ${{ inputs.USERNAME }}
        password: ${{ inputs.PASSWORD }}
        key: ${{ inputs.KEY }}
        passphrase: ${{ inputs.PASSPHRASE }}
        envs: DEPLOY_PATH,DEPLOY_BRANCH
        script: |
          set -euo pipefail
          if [ -f ~/.profile ]; then source ~/.profile; fi
          if [ -f ~/.nvm/nvm.sh ]; then source ~/.nvm/nvm.sh; fi || true

          # --- Validation ---
          validate_branch() {
            local name="$1"
            local value="$2"
            if [[ -z "$value" ]]; then
              echo "❌ Invalid branch name for $name: must not be empty" >&2; exit 1
            fi
            if [[ "$value" == -* ]]; then
              echo "❌ Invalid branch name for $name: must not start with '-'" >&2; exit 1
            fi
            if [[ "$value" == *:* ]]; then
              echo "❌ Invalid branch name for $name: must not contain ':'" >&2; exit 1
            fi
            if [[ "$value" == refs/* ]]; then
              echo "❌ Invalid branch name for $name: must not start with 'refs/'" >&2; exit 1
            fi
            if ! git check-ref-format --branch "$value" > /dev/null 2>&1; then
              echo "❌ Invalid branch name for $name: '$value' is not a valid Git branch" >&2; exit 1
            fi
          }

          if ! command -v git >/dev/null 2>&1; then
            echo "❌ Error: git is not installed or not available in PATH." >&2
            exit 1
          fi

          validate_branch "DEPLOY_BRANCH" "$DEPLOY_BRANCH"

          echo "🚀 Deploying to $DEPLOY_PATH..."
          cd "$DEPLOY_PATH"

          # Capture current commit for rollback
          PREV_COMMIT=$(git rev-parse HEAD)

          echo "⬇️ Fetching latest changes..."
          git fetch origin +refs/heads/"$DEPLOY_BRANCH":refs/remotes/origin/"$DEPLOY_BRANCH"
          git checkout "$DEPLOY_BRANCH"
          git pull origin "$DEPLOY_BRANCH"

          echo "📦 Installing dependencies..."
          pnpm install --frozen-lockfile

          echo "🏗️ Building project..."
          pnpm build

          echo "🔄 Reloading application..."
          pm2 startOrReload ecosystem.config.cjs --update-env
          pm2 save

          # Health check with rollback on failure
          sleep 3
          if ! pm2 ls | grep -qE "online"; then
            echo "❌ Health check failed! Rolling back to $PREV_COMMIT..."
            git checkout "$PREV_COMMIT"
            pnpm install --frozen-lockfile
            pnpm build
            pm2 startOrReload ecosystem.config.cjs --update-env
            pm2 save
            echo "⚠️ Rolled back to $PREV_COMMIT"
            exit 1
          fi

          echo "✅ Deployment successful!"
