---
name: 🔧 Env & Deps
description: This action sets up the environment and installs dependencies for the CI pipeline.
inputs:
  NODE_VERSION:
    description: Node.js version to use
    required: false
    default: "24.12.0"
  PNPM_VERSION:
    description: pnpm version to use
    required: false
    default: "10.29.3"
runs:
  using: "composite"
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061  # v4.2.0
      with:
        version: ${{ inputs.PNPM_VERSION }}

    - name: Setup Node.js
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
      with:
        node-version: ${{ inputs.NODE_VERSION }}
        cache: "pnpm"

    - name: Setup environment variables
      shell: bash
      run: |
        if [ -f ".env.example" ]; then
          # Guard: scan for common secret patterns before copying
          SECRET_PATTERNS='(sk_live|sk_test|ghp_|gho_|github_pat_|password=.+[^\s]|secret=.+[^\s]|PRIVATE_KEY=.+[^\s])'
          if grep -qEi "$SECRET_PATTERNS" .env.example 2>/dev/null; then
            echo "::error::.env.example appears to contain real secrets! Review and remove them before committing."
            exit 1
          fi
          cp .env.example .env
          echo "✅ Copied .env.example → .env (no secret patterns detected)."
        else
          echo ".env.example not found. Skipping."
        fi

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
