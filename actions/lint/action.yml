---
name: 🛠️ Lint
description: This action lints the project
inputs:
  SKIP_YAML_LINT:
    description: "Skip the YAML lint step (default: false)"
    required: false
    default: "false"
runs:
  using: "composite"
  steps:
    - name: Lint YAML
      if: ${{ inputs.SKIP_YAML_LINT != 'true' }}
      uses: cyberskill-world/.github/actions/lint-yaml@main

    - name: Run lint
      shell: bash
      run: pnpm run --if-present lint
