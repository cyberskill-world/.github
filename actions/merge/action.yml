---
name: 🔀 CS - Merge
description: This action merge the specific branch into the target branch
inputs:
  GH_TOKEN:
    description: GitHub token for authentication
    required: true
  FROM:
    description: The branch to merge from
    required: true
  TO:
    description: The branch to merge into
    required: true
  CHOOSE_STRATEGY:
    description: The strategy to use for the merge
    required: false
    default: "theirs"
runs:
  using: "composite"
  steps:
    - name: Set up Git & Auth
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.GH_TOKEN }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git remote set-url origin "https://x-access-token:$GH_TOKEN@github.com/${{ github.repository }}"

    - name: Merge and Push
      shell: bash
      env:
        FROM_BRANCH: ${{ inputs.FROM }}
        TO_BRANCH: ${{ inputs.TO }}
        STRATEGY: ${{ inputs.CHOOSE_STRATEGY }}
      run: |
        git fetch origin "$FROM_BRANCH" || { echo "❌ Branch $FROM_BRANCH not found"; exit 1; }
        git fetch origin "$TO_BRANCH" || { echo "❌ Branch $TO_BRANCH not found"; exit 1; }

        git checkout "$TO_BRANCH"
        git reset --hard "origin/$TO_BRANCH"

        echo "Merging $FROM_BRANCH into $TO_BRANCH with strategy: $STRATEGY"
        git merge "origin/$FROM_BRANCH" --allow-unrelated-histories -X "$STRATEGY" -m "Merge $FROM_BRANCH into $TO_BRANCH"

        git push origin "$TO_BRANCH"
