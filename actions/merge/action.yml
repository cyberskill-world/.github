---
name: 🔀 Merge
description: This action merges a source branch into the target branch
inputs:
  GH_TOKEN:
    description: GitHub token for authentication
    required: true
  FROM:
    description: The branch to merge from
    required: true
  TO:
    description: The branch to merge into
    required: true
  CHOOSE_STRATEGY:
    description: The strategy to use for the merge
    required: false
    default: "theirs"
  ALLOW_UNRELATED:
    description: "Allow merging unrelated histories (default: false)"
    required: false
    default: "false"
runs:
  using: "composite"
  steps:
    - name: Set up Git & Auth
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.GH_TOKEN }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        # 🛡️ Sentinel: Securely pass GitHub token to prevent leakage in CI logs and .git/config
        git config --local http.https://github.com/.extraheader "AUTHORIZATION: basic $(echo -n "x-access-token:${GH_TOKEN}" | base64 | tr -d '\n')"
        git remote set-url origin "https://github.com/${{ github.repository }}"

    - name: Merge and Push
      shell: bash
      env:
        FROM_BRANCH: ${{ inputs.FROM }}
        TO_BRANCH: ${{ inputs.TO }}
        STRATEGY: ${{ inputs.CHOOSE_STRATEGY }}
        ALLOW_UNRELATED: ${{ inputs.ALLOW_UNRELATED }}
      run: |
        set -euo pipefail

        # Source shared validation
        source "${{ github.action_path }}/../../scripts/validate-branch.sh"

        validate_branch "FROM" "$FROM_BRANCH"
        validate_branch "TO" "$TO_BRANCH"
        # ⚡ Bolt: Fetch both branches in a single command to save a network round-trip
        git fetch origin "$FROM_BRANCH" "$TO_BRANCH" || {
          echo "❌ Branch $FROM_BRANCH or $TO_BRANCH not found"; exit 1;
        }

        git checkout "$TO_BRANCH"
        git reset --hard "origin/$TO_BRANCH"

        MERGE_ARGS=("origin/$FROM_BRANCH" -X "$STRATEGY" -m "Merge $FROM_BRANCH into $TO_BRANCH")
        if [ "$ALLOW_UNRELATED" = "true" ]; then
          MERGE_ARGS+=(--allow-unrelated-histories)
        fi

        echo "Merging $FROM_BRANCH into $TO_BRANCH with strategy: $STRATEGY"
        git merge "${MERGE_ARGS[@]}"

        git push origin "HEAD:refs/heads/$TO_BRANCH"
        echo "✅ Merged. New HEAD: $(git rev-parse HEAD)"
