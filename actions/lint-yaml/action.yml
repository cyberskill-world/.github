---
name: "🛠️ CS - Lint YAML"
description: "Lints YAML files using yamllint"
runs:
  using: "composite"
  steps:
    - name: Copy requirements for caching
      shell: bash
      run: cp "${{ github.action_path }}/requirements.txt" .github-action-requirements.txt

    - name: JSON/YAML Validator
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: '3.14.3'
        cache: 'pip'
        cache-dependency-path: '.github-action-requirements.txt'

    - name: Install dependencies
      run: pip install -r .github-action-requirements.txt
      shell: bash

    - name: Lint YAML files
      run: yamllint -c "${{ github.action_path }}/../../.yamllint" .
      shell: bash
