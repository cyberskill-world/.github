---
name: CI - Validate Actions

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-yaml:
    name: Validate YAML
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Lint YAML
        uses: ./actions/lint-yaml

  validate-actions:
    name: Validate Action Schemas
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417  # v6.3.0
        with:
          go-version: 'stable'
          cache: false

      - name: Install actionlint
        shell: bash
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.11

      - name: Lint GitHub Actions
        shell: bash
        run: actionlint -color

  pin-checker:
    name: Verify SHA Pinning
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Check all uses are SHA-pinned
        shell: bash
        run: |
          set -euo pipefail
          ERRORS=0

          while IFS= read -r file; do
            while IFS= read -r line; do
              # Skip lines referencing local actions (./actions/...)
              if echo "$line" | grep -qE 'uses:\s*\./'; then
                continue
              fi
              # Skip org-internal .github repo references (SHA-pinning is impractical
              # since the SHA changes with every commit to this same repo)
              if echo "$line" | grep -qE 'uses:\s*cyberskill-world/\.github/'; then
                continue
              fi
              # Check if the action reference uses a full 40-char SHA
              if ! echo "$line" | grep -qE 'uses:\s*[^@]+@[0-9a-f]{40}'; then
                echo "::error file=$file::Unpinned action: $line"
                ERRORS=$((ERRORS + 1))
              fi
            done < <(grep -nE '^\s*uses:' "$file" || true)
          done < <(find . -name '*.yml' -o -name '*.yaml' | grep -v node_modules | grep -v '^\./\.git/')

          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::Found $ERRORS unpinned action reference(s). All 'uses:' must be pinned to full commit SHAs."
            exit 1
          fi
          echo "✅ All action references are SHA-pinned."

  sync-check:
    name: Validate Inlined Code Sync
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Check validate_branch() sync between source and deploy
        shell: bash
        run: |
          set -euo pipefail
          # Extract the inlined validate_branch function from deploy/action.yml
          sed -n '/^          validate_branch() {$/,/^          }$/p' actions/deploy/action.yml \
            | sed 's/^          //' > /tmp/deploy_func.sh
          # Extract the source function from scripts/validate-branch.sh
          sed -n '/^validate_branch() {$/,/^}$/p' scripts/validate-branch.sh > /tmp/source_func.sh
          if ! diff -u /tmp/source_func.sh /tmp/deploy_func.sh; then
            echo "::error::validate_branch() in actions/deploy/action.yml is out of sync with scripts/validate-branch.sh"
            exit 1
          fi
          echo "✅ validate_branch() is in sync."

  shellcheck:
    name: Lint Shell Scripts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Run ShellCheck on standalone scripts
        shell: bash
        run: |
          if compgen -G "scripts/*.sh" > /dev/null; then
            shellcheck scripts/*.sh
          fi
          echo "✅ ShellCheck passed for standalone scripts."

      - name: Run ShellCheck on inline action scripts
        shell: bash
        run: |
          set -euo pipefail
          ERRORS=0
          EXTRACT_DIR=$(mktemp -d)
          for file in actions/*/action.yml; do
            # Extract inline 'run:' script blocks from YAML using a heredoc for Python
            python3 <<PYEOF
          import yaml, sys, os
          with open('$file') as f:
              data = yaml.safe_load(f)
          steps = data.get('runs', {}).get('steps', [])
          for i, step in enumerate(steps):
              if 'run' in step:
                  name = os.path.basename(os.path.dirname('$file'))
                  out = os.path.join('$EXTRACT_DIR', f'{name}_{i}.sh')
                  with open(out, 'w') as o:
                      o.write('#!/usr/bin/env bash\n')
                      o.write(step['run'])
          PYEOF
          done
          if compgen -G "$EXTRACT_DIR/*.sh" > /dev/null; then
            # SC1091: Don't follow sourced files (unavailable in CI context)
            # SC2086: Allow word splitting where intended in CI scripts
            shellcheck --exclude=SC1091,SC2086 "$EXTRACT_DIR"/*.sh || ERRORS=$((ERRORS + 1))
          fi
          rm -rf "$EXTRACT_DIR"
          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::ShellCheck found issues in inline action scripts"
            exit 1
          fi
          echo "✅ Inline ShellCheck complete."

  codeowners-check:
    name: Validate CODEOWNERS
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Validate CODEOWNERS syntax
        shell: bash
        run: |
          set -euo pipefail
          ERRORS=0
          if [ ! -f CODEOWNERS ]; then
            echo "::warning::No CODEOWNERS file found"
            exit 0
          fi
          while IFS= read -r line; do
            # Skip comments and empty lines
            [[ "$line" =~ ^[[:space:]]*# ]] && continue
            [[ -z "${line// }" ]] && continue
            # Each rule must have at least a pattern and one owner
            parts=($line)
            if [ "${#parts[@]}" -lt 2 ]; then
              echo "::error::Invalid CODEOWNERS line (missing owner): $line"
              ERRORS=$((ERRORS + 1))
            fi
            # Owners must start with @ or be an email
            for owner in "${parts[@]:1}"; do
              if [[ "$owner" != @* ]] && [[ "$owner" != *@* ]]; then
                echo "::error::Invalid owner format '$owner' in: $line"
                ERRORS=$((ERRORS + 1))
              fi
            done
          done < CODEOWNERS
          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::Found $ERRORS CODEOWNERS syntax error(s)"
            exit 1
          fi
          echo "✅ CODEOWNERS syntax is valid."

  breaking-change-guard:
    name: Detect Breaking Input Changes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout PR
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Checkout base branch for comparison
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.base_ref }}
          path: base

      - name: Compare action input schemas
        shell: bash
        run: |
          set -euo pipefail
          BREAKING=0
          for base_file in base/actions/*/action.yml; do
            action_name=$(basename "$(dirname "$base_file")")
            pr_file="actions/$action_name/action.yml"
            if [ ! -f "$pr_file" ]; then
              echo "::warning::Action '$action_name' was deleted in this PR"
              BREAKING=$((BREAKING + 1))
              continue
            fi
            # Extract required input names from base
            BASE_INPUTS=$(python3 -c "
          import yaml
          with open('$base_file') as f:
              data = yaml.safe_load(f) or {}
          inputs = data.get('inputs', {}) or {}
          for name, props in inputs.items():
              if props.get('required', False):
                  print(name)
          " 2>/dev/null | sort || true)
            # Extract required input names from PR
            PR_INPUTS=$(python3 -c "
          import yaml
          with open('$pr_file') as f:
              data = yaml.safe_load(f) or {}
          inputs = data.get('inputs', {}) or {}
          for name, props in inputs.items():
              if props.get('required', False):
                  print(name)
          " 2>/dev/null | sort || true)
            # Check for removed required inputs
            REMOVED=$(comm -23 <(echo "$BASE_INPUTS") <(echo "$PR_INPUTS") || true)
            if [ -n "$REMOVED" ]; then
              echo "::error::Action '$action_name' has removed required inputs: $REMOVED"
              BREAKING=$((BREAKING + 1))
            fi
          done
          if [ "$BREAKING" -gt 0 ]; then
            echo "::error::Found $BREAKING potential breaking change(s). Add 'breaking-change-approved' label to override."
            # Check for override label
            if [ -n "${GITHUB_EVENT_PATH:-}" ]; then
              LABELS=$(python3 -c "import json; evt=json.load(open('$GITHUB_EVENT_PATH')); print(' '.join(l['name'] for l in evt.get('pull_request',{}).get('labels',[])))" 2>/dev/null || true)
              if echo "$LABELS" | grep -q "breaking-change-approved"; then
                echo "✅ Breaking change approved via label."
                exit 0
              fi
            fi
            exit 1
          fi
          echo "✅ No breaking input changes detected."

  readme-sync:
    name: Verify README Action Table
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Check all actions are listed in README
        shell: bash
        run: |
          set -euo pipefail
          ERRORS=0
          for dir in actions/*/; do
            action_name=$(basename "$dir")
            if ! grep -q "$action_name" docs/README.md; then
              echo "::error::Action '$action_name' is not listed in docs/README.md"
              ERRORS=$((ERRORS + 1))
            fi
          done
          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::$ERRORS action(s) missing from README. Update the action table in docs/README.md."
            exit 1
          fi
          echo "✅ All actions are documented in README."
