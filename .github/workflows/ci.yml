---
name: CI - Validate Actions

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-yaml:
    name: Validate YAML
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Lint YAML
        uses: ./actions/lint-yaml

  validate-actions:
    name: Validate Action Schemas
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install actionlint
        shell: bash
        run: |
          VERSION="1.7.11"
          CHECKSUM="7d588eeb1ceb1e926b5618162a082453e1618b7772597e4ef8270e08777a8114"
          BASE="https://github.com/rhysd/actionlint/releases/download"
          ARCHIVE="actionlint_${VERSION}_linux_amd64.tar.gz"

          curl -sLo "/tmp/${ARCHIVE}" "${BASE}/v${VERSION}/${ARCHIVE}"
          echo "${CHECKSUM}  /tmp/${ARCHIVE}" | sha256sum -c -
          tar xz -C /usr/local/bin actionlint < "/tmp/${ARCHIVE}"
          rm "/tmp/${ARCHIVE}"

      - name: Lint GitHub Actions
        shell: bash
        run: actionlint -color

  pin-checker:
    name: Verify SHA Pinning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Check all uses are SHA-pinned
        shell: bash
        run: |
          set -euo pipefail
          ERRORS=0

          while IFS= read -r file; do
            while IFS= read -r line; do
              # Skip lines referencing local actions (./actions/...)
              if echo "$line" | grep -qE 'uses:\s*\./'; then
                continue
              fi
              # Skip org-internal .github repo references (SHA-pinning is impractical
              # since the SHA changes with every commit to this same repo)
              if echo "$line" | grep -qE 'uses:\s*cyberskill-world/\.github/'; then
                continue
              fi
              # Check if the action reference uses a full 40-char SHA
              if ! echo "$line" | grep -qE 'uses:\s*[^@]+@[0-9a-f]{40}'; then
                echo "::error file=$file::Unpinned action: $line"
                ERRORS=$((ERRORS + 1))
              fi
            done < <(grep -nE '^\s*uses:' "$file" || true)
          done < <(find . -name '*.yml' -o -name '*.yaml' | grep -v node_modules | grep -v .git/)

          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::Found $ERRORS unpinned action reference(s). All 'uses:' must be pinned to full commit SHAs."
            exit 1
          fi
          echo "✅ All action references are SHA-pinned."

  shellcheck:
    name: Lint Shell Scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Run ShellCheck on scripts
        shell: bash
        run: |
          if compgen -G "scripts/*.sh" > /dev/null; then
            shellcheck scripts/*.sh
          fi
          echo "✅ ShellCheck passed."
